name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # onlyBuiltDependencies (package.json) lets puppeteer fetch Chromium here,
      # which pa11y needs for the a11y check below.
      - run: pnpm install --frozen-lockfile

      - name: Lint (incl. no-hardcoded-strings)
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Accessibility (WCAG2AA)
        run: |
          pnpm preview &
          for i in $(seq 1 60); do curl -sf http://localhost:4321/ >/dev/null && break; sleep 0.5; done
          pnpm exec pa11y-ci

      # Serves dist/ as the web root so root-relative internal links resolve,
      # and checks external citation links for rot.
      - name: Link check
        run: npx --yes linkinator ./dist --recurse --silent
